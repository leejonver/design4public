name: CI

on:
  pull_request:
  push:
    branches: [main, 'unify/**']

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlLWRlbW8iLCJpYXQiOjE2NDE3NjkyMDAsImV4cCI6MTc5OTUzNTYwMH0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UtZGVtbyIsImlhdCI6MTY0MTc2OTIwMCwiZXhwIjoxNzk5NTM1NjAwfQ.DaYlNEoU_KfE_TSPYYRj_gS2SmqcFf0KHrDoWuvA7Wc
      E2E_MASTER_EMAIL: master@e2e.local
      E2E_MASTER_PASSWORD: e2e-master-pw-123
      E2E_CM_EMAIL: cm@e2e.local
      E2E_CM_PASSWORD: e2e-cm-pw-123
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --run

      - uses: supabase/setup-cli@v1
        with:
          version: 2.98.2

      - name: Start local Supabase
        run: supabase start

      - name: Apply migrations + seed
        run: supabase db reset

      - name: Restart Kong (db reset leaves it pointed at the pre-reset auth container)
        run: docker restart supabase_kong_design4public

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E
        env:
          DOTENV_CONFIG_QUIET: 'true'
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
